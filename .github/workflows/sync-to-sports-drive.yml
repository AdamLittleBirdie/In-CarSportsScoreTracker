name: Sync Design Tokens to sports-drive-monorepo

on:
  push:
    branches:
      - main
    paths:
      - '**.css'
      - '**.tsx'
      - '**.ts'
      - '**.json'

permissions:
  contents: read

jobs:
  trigger-figma-sync:
    name: Trigger figma-sync in sports-drive-monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Dispatch figma-token-update event
        run: |
          curl --fail-with-body -X POST \
            -H "Authorization: token ${{ secrets.SPORTS_DRIVE_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AdamLittleBirdie/sports-drive-monorepo/dispatches \
            -d "{\"event_type\":\"figma-token-update\",\"client_payload\":{\"sha\":\"${{ github.sha }}\"}}"
